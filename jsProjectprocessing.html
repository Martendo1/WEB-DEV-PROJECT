<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Processing</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f4f4f4;
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    width:90%;
    max-width:600px;
}

.icon{
    font-size:80px;
    margin-bottom:20px;
}

h1{
    color:#ff6600;
    margin-bottom:15px;
}

p{
    color:#555;
    font-size:18px;
    line-height:1.6;
    margin-bottom:30px;
}

.status{
    color:#28a745;
    font-weight:bold;
    font-size:20px;
    margin-bottom:25px;
}

button{
    background:#ff6600;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e65c00;
}
</style>
</head>
<body>

<div class="container">

    <div class="icon">🍽️</div>

    <h1>Order Received Successfully!</h1>

    <div class="status">
        Your order is being processed...
    </div>

    <p>
        Thank you for ordering from MARTENDO FOODS.
        Our kitchen team has received your order and is preparing it.
        You will receive your meal as soon as possible.
    </p>

    <button onclick="returnHome()">
        Return To Main Page
    </button>

</div>

<script>
function returnHome(){
    window.location.href = "jsProject.html";
}
</script>

</body>
</html>
